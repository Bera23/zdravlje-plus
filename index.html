<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pritisak — Dnevnik</title>
<meta name="description" content="Lični dnevnik krvnog pritiska i lekova">
<meta name="theme-color" content="#0f0f11" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f0eff4" media="(prefers-color-scheme: light)">
<!-- Prevent search engines from indexing — app contains private health data -->
<meta name="robots" content="noindex, nofollow">

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS home screen icon (Safari ignores manifest icons, uses 180x180) -->
<link rel="apple-touch-icon" href="icon192.png">

<!-- Favicon fallback -->
<link rel="icon" type="image/png" sizes="192x192" href="icon192.png">
<!-- Preconnect to Google Fonts origins to eliminate DNS + TLS latency -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  /* ════════════════════════════
     CSS CUSTOM PROPERTIES
  ════════════════════════════ */
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #e05c5c;
    --accent2: #f0a060;
    --good: #5cba8a;
    --text: #e8e8ec;
    --muted: #7a7a88;
    --radius: 14px;
    --radius-sm: 10px;    /* inputs, buttons, secondary elements */
    --radius-xs: 8px;     /* small buttons (refill, checkbox) */
    --radius-xxs: 6px;    /* icon buttons (delete) */
    --radius-pill: 20px;  /* badges */
    --radius-toast: 40px; /* toast notification */
    --radius-med-item: 12px; /* med check items */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --tab-h: 60px;

    /* Toast colors (not hardcoded inline) */
    --toast-ok-bg: var(--good);
    --toast-ok-fg: #0a1a12;
    --toast-err-bg: var(--accent2);
    --toast-err-fg: #1a0a00;

    /* Stock bar colors */
    --stock-ok: var(--good);
    --stock-low: var(--accent2);

    /* Badge backgrounds */
    --badge-normal-bg: rgba(92,186,138,0.15);
    --badge-high-bg: rgba(240,160,96,0.15);
    --badge-crisis-bg: rgba(224,92,92,0.15);

    /* Nav bar background (slightly darker than --bg) */
    --bg-nav: #111114;

    /* Button text */
    --btn-primary-fg: #ffffff;

    /* Med pill backgrounds */
    --pill-ok-bg: rgba(92,186,138,0.12);
    --pill-nok-bg: rgba(224,92,92,0.12);

    /* Input focus ring */
    --focus-ring: rgba(224,92,92,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    min-height: 100dvh;
    font-size: 16px;
    padding-bottom: calc(var(--safe-bottom) + var(--tab-h) + 16px);
    overscroll-behavior: none; /* prevents pull-to-refresh in Android TWA */
  }

  /* ── TOP HEADER ── */
  .top-header {
    text-align: center;
    padding: calc(var(--safe-top) + 20px) 16px 0;
    margin-bottom: 20px;
  }

  .top-header h1 {
    font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
    font-size: 1.75rem;
    font-weight: 300;
    color: var(--text);
  }

  .top-header h1 span { color: var(--accent); font-style: italic; }

  /* ── TAB BAR ── */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: calc(var(--safe-bottom) + var(--tab-h));
    background: var(--bg-nav);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding-top: 8px;
    z-index: 50;
  }

  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    color: var(--muted);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .tab-btn .tab-icon { font-size: 1.3rem; line-height: 1; }
  .tab-btn.active { color: var(--accent); }

  /* ── TAB PANELS ── */
  .tab-panel { display: none; padding: 0 16px; }
  .tab-panel.active { display: block; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── BP INPUTS ── */
  .inputs-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .input-group label {
    display: block;
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    text-align: center;
  }

  .input-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: max(1.4rem, 16px);
    font-weight: 500;
    text-align: center;
    padding: 16px 4px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }

  .input-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--focus-ring);
  }

  .unit {
    font-size: 0.56rem;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }

  /* ── DATETIME ROW ── */
  .datetime-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .dt-group label {
    display: block;
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .dt-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: max(1rem, 16px); /* min 16px — prevents Android keyboard auto-zoom */
    padding: 12px 10px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    color-scheme: dark;
    transition: border-color 0.18s;
  }

  .dt-group input:focus { border-color: var(--accent2); }

  /* ── NOTE ROW ── */
  .note-row { margin-bottom: 16px; }

  .note-row label {
    display: block;
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .note-row input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 1rem;
    padding: 13px 14px;
    outline: none;
    transition: border-color 0.18s;
  }

  .note-row input:focus { border-color: var(--accent2); }

  /* ── TOUCH-ACTION — eliminates 300ms tap delay on Android for all interactive elements ── */
  button, input, a, [onclick] {
    touch-action: manipulation;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: var(--btn-primary-fg);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 17px;
    cursor: pointer;
    -webkit-appearance: none;
  }

  .btn-primary:active { opacity: 0.85; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.72rem;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-secondary:active { border-color: var(--accent2); color: var(--accent2); }

  /* ── TODAY MEDS ── */
  .med-check-list { display: flex; flex-direction: column; gap: 10px; }

  .med-check-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-med-item);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.18s;
    -webkit-user-select: none;
    user-select: none;
  }

  .med-check-item.taken { border-color: var(--good); }

  .med-checkbox {
    width: 26px; height: 26px;
    border-radius: var(--radius-xs);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1rem;
    transition: background 0.18s, border-color 0.18s;
    color: transparent;
  }

  .med-check-item.taken .med-checkbox {
    background: var(--good);
    border-color: var(--good);
    color: var(--toast-ok-fg);
  }

  .med-check-info { flex: 1; }

  .med-check-name {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .med-check-sub {
    font-size: 0.65rem;
    color: var(--muted);
  }

  .low-stock-warn {
    font-size: 0.62rem;
    color: var(--accent2);
    margin-top: 2px;
  }

  .today-empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 28px 0;
  }

  .today-empty a {
    color: var(--accent2);
    text-decoration: underline;
    cursor: pointer;
  }

  /* ── MEDS TAB ── */
  .med-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }

  .med-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .med-card-name {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
  }

  .med-card-meta {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .med-card-actions { display: flex; gap: 8px; align-items: center; }

  .btn-refill {
    background: var(--pill-ok-bg);
    border: 1px solid var(--good);
    border-radius: var(--radius-xs);
    color: var(--good);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.65rem;
    padding: 6px 12px;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-refill:active { opacity: 0.75; }

  .btn-del-med {
    background: none;
    border: none;
    color: var(--border);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--radius-xxs);
  }

  .btn-del-med:active { color: var(--accent); }

  /* Stock adjustment buttons (–1 / +1) */
  .btn-stock-adj {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xxs);
    color: var(--muted);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 5px 9px;
    cursor: pointer;
    line-height: 1;
  }

  .btn-stock-adj:active { border-color: var(--accent2); color: var(--accent2); }

  /* stock bar */
  .form-row-grid .form-row { margin-bottom: 0; }

  .add-med-btn-row { margin-top: 14px; }

  .stock-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }

  .stock-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .stock-bar-fill {
    height: 100%;
    border-radius: var(--radius-sm);
    transition: width 0.3s;
    background: var(--stock-ok);
  }

  .stock-bar-fill.low { background: var(--stock-low); }

  .stock-label {
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .stock-warn { color: var(--accent2) !important; }

  /* add med form */
  .add-med-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    margin-bottom: 14px;
  }

  .form-row {
    margin-bottom: 12px;
  }

  .form-row label {
    display: block;
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .form-row input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 1rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.18s;
  }

  .form-row input:focus { border-color: var(--accent2); }

  .form-row-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  /* ── HISTORY TAB ── */

  /* Month navigation bar */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 12px;
  }

  .month-nav-label {
    font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .month-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    color: var(--text);
    font-size: 1rem;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    line-height: 1;
  }

  .month-nav-btn:active { border-color: var(--accent); color: var(--accent); }

  /* Filter row */
  .hist-filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }

  .hist-filter-row input[type="date"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: max(1rem, 16px); /* min 16px — prevents Android keyboard auto-zoom */
    padding: 11px 12px;
    outline: none;
    color-scheme: dark;
    -webkit-appearance: none;
  }

  .hist-count { font-size: 0.65rem; color: var(--muted); margin-bottom: 12px; }

  /* Day group card — wraps all entries for one day */
  .day-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    animation: fadeIn 0.2s ease;
  }

  .day-group-header {
    padding: 12px 16px;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  /* Entry inside day group — no card background, separator between entries */
  .entry {
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .entry:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .entry-values {
    display: flex;
    align-items: baseline;
    gap: 5px;
    margin-bottom: 5px;
  }

  .val-sys, .val-dia { font-size: 1.5rem; font-weight: 500; line-height: 1; }
  .val-sep { font-size: 1rem; color: var(--muted); }
  .val-pulse { font-size: 0.88rem; color: var(--muted); margin-left: 6px; }

  .entry-time { font-size: 0.66rem; color: var(--muted); }
  .entry-note { font-size: 0.68rem; color: var(--muted); margin-top: 3px; font-style: italic; }

  .entry-meds {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .med-pill {
    padding: 2px 7px;
    border-radius: var(--radius-sm);
    font-size: 0.58rem;
  }

  .med-pill.ok  { background: var(--pill-ok-bg);  color: var(--good); }
  .med-pill.nok { background: var(--pill-nok-bg); color: var(--muted); }

  .entry-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }

  .badge {
    font-size: 0.56rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
  }

  .badge-normal { background: var(--badge-normal-bg); color: var(--good); }
  .badge-high   { background: var(--badge-high-bg);   color: var(--accent2); }
  .badge-crisis { background: var(--badge-crisis-bg); color: var(--accent); }

  .btn-del-entry {
    background: none; border: none; color: var(--border);
    font-size: 1.1rem; cursor: pointer; padding: 8px; border-radius: var(--radius-xxs);
  }

  .btn-del-entry:active { color: var(--accent); }

  .sys-normal { color: var(--good); }
  .sys-high   { color: var(--accent2); }
  .sys-crisis { color: var(--accent); }

  .empty {
    text-align: center; color: var(--muted);
    font-size: 0.78rem; padding: 36px 0; letter-spacing: 0.05em;
  }

  .export-row { margin-top: 16px; text-align: right; }

  /* ── DB LOADING STATE ── */
  .db-loading {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 40px 0;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + var(--tab-h) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--toast-ok-bg);
    color: var(--toast-ok-fg);
    font-size: 0.78rem;
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    padding: 12px 22px;
    border-radius: var(--radius-toast);
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .section-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding: 0 2px;
  }
</style>
</head>
<body>

<div class="top-header">
  <h1>Zdravlje <span>+</span></h1>
</div>

<!-- ══════════════════════════════
     TAB: DANAS
══════════════════════════════ -->
<div id="tab-danas" class="tab-panel active">

  <!-- Today's meds -->
  <div class="card">
    <div class="card-title">Lekovi danas</div>
    <div id="today-meds-list"><div class="db-loading">Učitavanje…</div></div>
  </div>

  <!-- BP form -->
  <div class="card">
    <div class="card-title">Novo merenje pritiska</div>

    <div class="inputs-row">
      <div class="input-group">
        <label>Gornji</label>
        <input type="text" id="sys" placeholder="120" maxlength="3" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
        <div class="unit">mmHg</div>
      </div>
      <div class="input-group">
        <label>Donji</label>
        <input type="text" id="dia" placeholder="80" maxlength="3" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
        <div class="unit">mmHg</div>
      </div>
      <div class="input-group">
        <label>Puls</label>
        <input type="text" id="pulse" placeholder="72" maxlength="3" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
        <div class="unit">bpm</div>
      </div>
    </div>

    <div class="datetime-row">
      <div class="dt-group">
