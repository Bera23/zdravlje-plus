<!-- v2.19 | 2026-06-01 | Fix: hardcoded color → var(--toast-err-fg), remove dead .med-check-list CSS -->
<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Srce & Pritisak — Dnevnik</title>
<meta name="description" content="Lični dnevnik krvnog pritiska i lekova">
<meta name="theme-color" content="#0f0f11" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f0eff4" media="(prefers-color-scheme: light)">
<!-- Prevent search engines from indexing — app contains private health data -->
<meta name="robots" content="noindex, nofollow">

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS home screen icon (Safari ignores manifest icons, uses 180x180) -->
<link rel="apple-touch-icon" href="icon192.png">

<!-- Favicon fallback -->
<link rel="icon" type="image/png" sizes="192x192" href="icon192.png">
<!-- Preconnect to Google Fonts origins to eliminate DNS + TLS latency -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  /* ════════════════════════════
     CSS CUSTOM PROPERTIES
  ════════════════════════════ */
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #e05c5c;
    --accent2: #f0a060;
    --good: #5cba8a;
    --text: #e8e8ec;
    --muted: #7a7a88;
    --radius: 14px;
    --radius-sm: 10px;    /* inputs, buttons, secondary elements */
    --radius-xs: 8px;     /* small buttons (refill, checkbox) */
    --radius-xxs: 6px;    /* icon buttons (delete) */
    --radius-pill: 20px;  /* badges */
    --radius-toast: 40px; /* toast notification */
    --radius-med-item: 12px; /* med check items */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --tab-h: 60px;

    /* Toast colors (not hardcoded inline) */
    --toast-ok-bg: var(--good);
    --toast-ok-fg: #0a1a12;
    --toast-err-bg: var(--accent2);
    --toast-err-fg: #1a0a00;

    /* Stock bar colors */
    --stock-ok: var(--good);
    --stock-low: var(--accent2);

    /* Badge backgrounds */
    --badge-normal-bg: rgba(92,186,138,0.15);
    --badge-high-bg: rgba(240,160,96,0.15);
    --badge-crisis-bg: rgba(224,92,92,0.15);

    /* Nav bar background (slightly darker than --bg) */
    --bg-nav: #111114;

    /* Button text */
    --btn-primary-fg: #ffffff;

    /* Med pill backgrounds */
    --pill-ok-bg: rgba(92,186,138,0.12);
    --pill-nok-bg: rgba(224,92,92,0.12);

    /* Input focus ring */
    --focus-ring: rgba(224,92,92,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    min-height: 100dvh;
    font-size: 16px;
    padding-bottom: calc(var(--safe-bottom) + var(--tab-h) + 16px);
    overscroll-behavior: none; /* prevents pull-to-refresh in Android TWA */
  }

  /* ── TOP HEADER ── */
  .top-header {
    text-align: center;
    padding: calc(var(--safe-top) + 20px) 16px 0;
    margin-bottom: 20px;
  }

  .top-header h1 {
    font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
    font-size: 1.75rem;
    font-weight: 300;
    color: var(--text);
  }

  .top-header h1 span { color: var(--accent); font-style: italic; }

  /* ── TAB BAR ── */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: calc(var(--safe-bottom) + var(--tab-h));
    background: var(--bg-nav);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding-top: 8px;
    z-index: 50;
  }

  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    color: var(--muted);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .tab-btn .tab-icon { font-size: 1.3rem; line-height: 1; }
  .tab-btn.active { color: var(--accent); }

  /* ── TAB PANELS ── */
  .tab-panel { display: none; padding: 0 16px; }
  .tab-panel.active { display: block; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── BP INPUTS ── */
  .inputs-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .input-group label {
    display: block;
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    text-align: center;
  }

  .input-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: max(1.4rem, 16px);
    font-weight: 500;
    text-align: center;
    padding: 16px 4px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }

  .input-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--focus-ring);
  }

  .unit {
    font-size: 0.56rem;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }

  /* ── DATETIME ROW ── */
  .datetime-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .dt-group label {
    display: block;
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .dt-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: max(1rem, 16px); /* min 16px — prevents Android keyboard auto-zoom */
    padding: 12px 10px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    color-scheme: dark;
    transition: border-color 0.18s;
  }

  .dt-group input:focus { border-color: var(--accent2); }

  /* ── NOTE ROW ── */
  .note-row { margin-bottom: 16px; }

  .note-row label {
    display: block;
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .note-row input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 1rem;
    padding: 13px 14px;
    outline: none;
    transition: border-color 0.18s;
  }

  .note-row input:focus { border-color: var(--accent2); }

  /* ── TOUCH-ACTION — eliminates 300ms tap delay on Android for all interactive elements ── */
  button, input, a, [onclick] {
    touch-action: manipulation;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: var(--btn-primary-fg);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 17px;
    cursor: pointer;
    -webkit-appearance: none;
  }

  .btn-primary:active { opacity: 0.85; }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.72rem;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-secondary:active { border-color: var(--accent2); color: var(--accent2); }

  /* ── TODAY MEDS ── */
  .med-check-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-med-item);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.18s;
    -webkit-user-select: none;
    user-select: none;
  }

  .med-check-item.taken { border-color: var(--good); }

  .med-checkbox {
    width: 26px; height: 26px;
    border-radius: var(--radius-xs);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1rem;
    transition: background 0.18s, border-color 0.18s;
    color: transparent;
  }

  .med-check-item.taken .med-checkbox {
    background: var(--good);
    border-color: var(--good);
    color: var(--toast-ok-fg);
  }

  .med-check-info { flex: 1; }

  .med-check-name {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .med-check-sub {
    font-size: 0.65rem;
    color: var(--muted);
  }

  .low-stock-warn {
    font-size: 0.62rem;
    color: var(--accent2);
    margin-top: 2px;
  }

  .today-empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 20px 0;
  }

  .today-empty p {
    margin-bottom: 14px;
  }

  .btn-add-med-empty {
    background: transparent;
    border: 1px solid var(--accent2);
    border-radius: var(--radius-sm);
    color: var(--accent2);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 12px 24px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .btn-add-med-empty:active {
    background: var(--accent2);
    color: var(--toast-err-fg);
  }

  /* ── MEDS TAB ── */
  .med-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }

  .med-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .med-card-name {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
  }

  .med-card-meta {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .med-card-actions { display: flex; align-items: center; }

  .med-card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
  }

  .med-card-footer .btn-refill { flex-shrink: 0; }

  .med-stock-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }

  .stock-count-display {
    font-size: 0.75rem;
    color: var(--muted);
    min-width: 32px;
    text-align: center;
  }

  .btn-refill {
    background: var(--pill-ok-bg);
    border: 1px solid var(--good);
    border-radius: var(--radius-xs);
    color: var(--good);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.65rem;
    padding: 6px 12px;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-refill:active { opacity: 0.75; }

  .btn-del-med {
    background: none;
    border: none;
    color: var(--border);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--radius-xxs);
  }

  .btn-del-med:active { color: var(--accent); }

  /* Stock adjustment buttons (–1 / +1) */
  .btn-stock-adj {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xxs);
    color: var(--muted);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 5px 9px;
    cursor: pointer;
    line-height: 1;
  }

  .btn-stock-adj:active { border-color: var(--accent2); color: var(--accent2); }

  /* stock bar */
  .form-row-grid .form-row { margin-bottom: 0; }

  .add-med-btn-row { margin-top: 14px; }

  .stock-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }

  .stock-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .stock-bar-fill {
    height: 100%;
    border-radius: var(--radius-sm);
    transition: width 0.3s;
    background: var(--stock-ok);
  }

  .stock-bar-fill.low { background: var(--stock-low); }

  .stock-label {
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .stock-warn { color: var(--accent2) !important; }

  /* add med form */
  .add-med-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    margin-bottom: 14px;
  }

  .form-row {
    margin-bottom: 12px;
  }

  .form-row label {
    display: block;
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .form-row input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: 1rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.18s;
  }

  .form-row input:focus { border-color: var(--accent2); }

  .form-row-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  /* ── HISTORY TAB ── */

  /* Month navigation bar */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 12px;
  }

  .month-nav-label {
    font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .month-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    color: var(--text);
    font-size: 1rem;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    line-height: 1;
  }

  .month-nav-btn:active { border-color: var(--accent); color: var(--accent); }

  /* Filter row */
  .hist-filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }

  .hist-filter-row input[type="date"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    font-size: max(1rem, 16px); /* min 16px — prevents Android keyboard auto-zoom */
    padding: 11px 12px;
    outline: none;
    color-scheme: dark;
    -webkit-appearance: none;
  }

  .hist-count { font-size: 0.65rem; color: var(--muted); margin-bottom: 12px; }

  /* Day group card — wraps all entries for one day */
  .day-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    animation: fadeIn 0.2s ease;
  }

  .day-group-header {
    padding: 12px 16px;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  /* Entry inside day group — no card background, separator between entries */
  .entry {
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .entry:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .entry-values {
    display: flex;
    align-items: baseline;
    gap: 5px;
    margin-bottom: 5px;
  }

  .val-sys, .val-dia { font-size: 1.5rem; font-weight: 500; line-height: 1; }
  .val-sep { font-size: 1rem; color: var(--muted); }
  .val-pulse { font-size: 0.88rem; color: var(--muted); margin-left: 6px; }

  .entry-time { font-size: 0.66rem; color: var(--muted); }
  .entry-note { font-size: 0.68rem; color: var(--muted); margin-top: 3px; font-style: italic; }

  .entry-meds {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .med-pill {
    padding: 2px 7px;
    border-radius: var(--radius-sm);
    font-size: 0.58rem;
  }

  .med-pill.ok  { background: var(--pill-ok-bg);  color: var(--good); }
  .med-pill.nok { background: var(--pill-nok-bg); color: var(--muted); }

  .entry-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }

  .badge {
    font-size: 0.56rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
  }

  .badge-normal { background: var(--badge-normal-bg); color: var(--good); }
  .badge-high   { background: var(--badge-high-bg);   color: var(--accent2); }
  .badge-crisis { background: var(--badge-crisis-bg); color: var(--accent); }

  .btn-del-entry {
    background: none; border: none; color: var(--border);
    font-size: 1.1rem; cursor: pointer; padding: 8px; border-radius: var(--radius-xxs);
  }

  .btn-del-entry:active { color: var(--accent); }

  .sys-normal { color: var(--good); }
  .sys-high   { color: var(--accent2); }
  .sys-crisis { color: var(--accent); }

  .empty {
    text-align: center; color: var(--muted);
    font-size: 0.78rem; padding: 36px 0; letter-spacing: 0.05em;
  }

  .export-row { margin-top: 16px; text-align: right; }

  /* ── DB LOADING STATE ── */
  .db-loading {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 40px 0;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + var(--tab-h) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--toast-ok-bg);
    color: var(--toast-ok-fg);
    font-size: 0.78rem;
    font-family: 'DM Mono', 'Courier New', Courier, monospace;
    padding: 12px 22px;
    border-radius: var(--radius-toast);
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .section-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding: 0 2px;
  }
</style>
</head>
<body>

<div class="top-header">
  <h1>Srce <span>&amp;</span> Pritisak</h1>
</div>

<!-- ══════════════════════════════
     TAB: DANAS
══════════════════════════════ -->
<div id="tab-danas" class="tab-panel active">

  <!-- Today's meds -->
  <div class="card">
    <div class="card-title">Lekovi danas</div>
    <div id="today-meds-list"><div class="db-loading">Učitavanje…</div></div>
  </div>

  <!-- BP form -->
  <div class="card">
    <div class="card-title">Novo merenje pritiska</div>

    <div class="inputs-row">

<div id="toast"></div>

<script>
  // ════════════════════════════
  // 1. CONSTANTS & CONFIG
  // ════════════════════════════

  const DB_NAME    = 'pritisak_db';
  const DB_VERSION = 1;

  /** IndexedDB object store names */
  const STORE_MEASUREMENTS = 'measurements'; // BP entries
  const STORE_MEDICATIONS  = 'medications';  // Med definitions
  const STORE_TAKEN        = 'taken';        // { date: "YYYY-MM-DD", medId: number, taken: boolean }

  /** localStorage keys used only during one-time migration */
  const LS_BP    = 'bp_entries';
  const LS_MEDS  = 'meds_list';
  const LS_TAKEN = 'meds_taken';

  /** Validation bounds (fixed — do not change) */
  const VALID = { sysMin: 60, sysMax: 300, diaMin: 40, diaMax: 200, pulseMin: 30, pulseMax: 250 };

  /** Serbian month names (nominative) */
  const SR_MONTHS = [
    'Januar','Februar','Mart','April','Maj','Jun',
    'Jul','Avgust','Septembar','Oktobar','Novembar','Decembar'
  ];

  /**
   * Currently displayed month/year in Istorija tab.
   * Initialized to current month in appInit().
   * { year: number, month: number (0-based) }
   */
  let histViewMonth = { year: 0, month: 0 };

  // ════════════════════════════
  // 2. INDEXEDDB INIT
  // ════════════════════════════

  /** Holds the open IDBDatabase instance after initDB() resolves */
  let db = null;

  /**
   * Opens (or creates) the IndexedDB database.
   * Creates all object stores on first run.
   * Runs one-time migration from localStorage if legacy data exists.
   * @returns {Promise<IDBDatabase>}
   */
  async function initDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);

      req.onupgradeneeded = (e) => {
        const idb = e.target.result;

        // measurements store — keyed by numeric id, indexed by ts for sorting
        if (!idb.objectStoreNames.contains(STORE_MEASUREMENTS)) {
          const ms = idb.createObjectStore(STORE_MEASUREMENTS, { keyPath: 'id' });
          ms.createIndex('ts', 'ts', { unique: false });
        }

        // medications store — keyed by numeric id
        if (!idb.objectStoreNames.contains(STORE_MEDICATIONS)) {
          idb.createObjectStore(STORE_MEDICATIONS, { keyPath: 'id' });
        }

        // taken store — composite key [date, medId]
        if (!idb.objectStoreNames.contains(STORE_TAKEN)) {
          const ts = idb.createObjectStore(STORE_TAKEN, { keyPath: ['date', 'medId'] });
          ts.createIndex('date', 'date', { unique: false });
        }
      };

      req.onerror   = () => reject(req.error);
      req.onsuccess = (e) => { resolve(e.target.result); };
    });
  }

  /**
   * One-time migration: reads localStorage data and writes it to IndexedDB.
   * Runs only if localStorage has data and migration hasn't been done yet.
   * Does NOT delete localStorage data (safe rollback).
   */
  async function migrateFromLocalStorage() {
    const migrationKey = 'idb_migration_done_v1';
    if (localStorage.getItem(migrationKey)) return; // already migrated

    try {
      // Migrate BP entries
      const lsEntries = JSON.parse(localStorage.getItem(LS_BP) || '[]');
      for (const entry of lsEntries) {
        await dbPut(STORE_MEASUREMENTS, entry);
      }

      // Migrate medications
      const lsMeds = JSON.parse(localStorage.getItem(LS_MEDS) || '[]');
      for (const med of lsMeds) {
        await dbPut(STORE_MEDICATIONS, med);
      }

      // Migrate taken records: { "YYYY-MM-DD": { medId: bool } } → flat records
      const lsTaken = JSON.parse(localStorage.getItem(LS_TAKEN) || '{}');
      for (const [date, medMap] of Object.entries(lsTaken)) {
        for (const [medIdStr, takenVal] of Object.entries(medMap)) {
          const medId = Number(medIdStr);
          await dbPut(STORE_TAKEN, { date, medId, taken: !!takenVal });
        }
      }

      localStorage.setItem(migrationKey, '1');
      if (lsEntries.length || lsMeds.length) {
        showToast('Podaci su migrirani iz starog formata ✓');
      }
    } catch (err) {
      console.error('[Migration] Failed:', err);
      // Non-fatal: user keeps old data in localStorage
    }
  }

  // ════════════════════════════
  // 3. DATA ACCESS FUNCTIONS (CRUD)
  // ════════════════════════════

  /**
   * Wraps an IDBRequest in a Promise.
   * @param {IDBRequest} req
   * @returns {Promise<any>}
   */
  function promisifyRequest(req) {
    return new Promise((resolve, reject) => {
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });
  }

  /**
   * Reads all records from an object store.
   * @param {string} storeName
   * @returns {Promise<Array>}
   */
  async function dbGetAll(storeName) {
    try {
      const tx    = db.transaction(storeName, 'readonly');
      const store = tx.objectStore(storeName);
      return await promisifyRequest(store.getAll());
    } catch (err) {
      console.error(`[DB] getAll(${storeName}) failed:`, err);
      return [];
    }
  }

  /**
   * Reads a single record by its primary key from an object store.
   * Returns null if not found.
   * @param {string}       storeName
   * @param {IDBValidKey}  key
   * @returns {Promise<Object|null>}
   */
  async function dbGet(storeName, key) {
    try {
      const tx    = db.transaction(storeName, 'readonly');
      const store = tx.objectStore(storeName);
      const result = await promisifyRequest(store.get(key));
      return result ?? null;
    } catch (err) {
      console.error(`[DB] get(${storeName}, ${key}) failed:`, err);
      return null;
    }
  }

  /**
   * Reads all measurements sorted by timestamp descending using the 'ts' index cursor.
   * Avoids a full JS sort — IDB returns records in index order natively.
   * Falls back to dbGetAll + JS sort if the index is unavailable.
   * @returns {Promise<Array>}
   */
  async function getMeasurementsSortedDesc() {
    try {
      const tx    = db.transaction(STORE_MEASUREMENTS, 'readonly');
      const store = tx.objectStore(STORE_MEASUREMENTS);
      const index = store.index('ts');

      return await new Promise((resolve, reject) => {
        const results = [];
        // 'prev' direction = descending (newest first)
        const req = index.openCursor(null, 'prev');
        req.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            results.push(cursor.value);
            cursor.continue();
          } else {
            resolve(results);
          }
        };
        req.onerror = () => reject(req.error);
      });
    } catch (err) {
      console.error('[DB] getMeasurementsSortedDesc() failed, falling back to JS sort:', err);
      // Graceful fallback — app still works without the index
      const all = await dbGetAll(STORE_MEASUREMENTS);
      return all.sort((a, b) => new Date(b.ts) - new Date(a.ts));
    }
  }

  /**
   * Adds or updates a record in an object store (upsert).
   * @param {string} storeName
   * @param {Object} record
   * @returns {Promise<void>}
   */
  async function dbPut(storeName, record) {
    try {
      const tx    = db.transaction(storeName, 'readwrite');
      const store = tx.objectStore(storeName);
      await promisifyRequest(store.put(record));
    } catch (err) {
      console.error(`[DB] put(${storeName}) failed:`, err);
      throw err; // re-throw so callers can show error UI
    }
  }

  /**
   * Deletes a record by key from an object store.
   * @param {string} storeName
   * @param {IDBValidKey} key - single key or array for composite keys
   * @returns {Promise<void>}
   */
  async function dbDelete(storeName, key) {
    try {
      const tx    = db.transaction(storeName, 'readwrite');
      const store = tx.objectStore(storeName);
      await promisifyRequest(store.delete(key));
    } catch (err) {
      console.error(`[DB] delete(${storeName}) failed:`, err);
      throw err;
    }
  }

  /**
   * Gets all taken records for a specific date.
   * Returns a Map<medId, boolean> for quick lookup.
   * @param {string} date - "YYYY-MM-DD"
   * @returns {Promise<Map<number, boolean>>}
   */
  async function getTakenForDate(date) {
    try {
      const tx    = db.transaction(STORE_TAKEN, 'readonly');
      const store = tx.objectStore(STORE_TAKEN);
      const idx   = store.index('date');
      const records = await promisifyRequest(idx.getAll(date));
      const map = new Map();
      for (const r of records) {
        map.set(r.medId, r.taken);
      }
      return map;
    } catch (err) {
      console.error(`[DB] getTakenForDate(${date}) failed:`, err);
      return new Map();
    }
  }

  /**
   * Gets all taken records, grouped by date.
   * Returns Map<"YYYY-MM-DD", Map<medId, boolean>>.
   * Used by CSV export (needs all data).
   * @returns {Promise<Map<string, Map<number, boolean>>>}
   */
  async function getAllTakenGrouped() {
    try {
      const all = await dbGetAll(STORE_TAKEN);
      const grouped = new Map();
      for (const r of all) {
        if (!grouped.has(r.date)) grouped.set(r.date, new Map());
        grouped.get(r.date).set(r.medId, r.taken);
      }
      return grouped;
    } catch (err) {
      console.error('[DB] getAllTakenGrouped() failed:', err);
      return new Map();
    }
  }

  /**
   * Gets taken records grouped by date, filtered to a specific year/month.
   * More efficient than getAllTakenGrouped() for single-month rendering.
   * Returns Map<"YYYY-MM-DD", Map<medId, boolean>>.
   * @param {number} year
   * @param {number} month - 0-based (0=January)
   * @returns {Promise<Map<string, Map<number, boolean>>>}
   */
  async function getTakenForMonth(year, month) {
    try {
      // Build date range prefix: "YYYY-MM-" to filter by month without a full table scan
      const mm     = String(month + 1).padStart(2, '0');
      const prefix = `${year}-${mm}-`;
      const all    = await dbGetAll(STORE_TAKEN);
      const grouped = new Map();
      for (const r of all) {
        if (!r.date.startsWith(prefix)) continue;
        if (!grouped.has(r.date)) grouped.set(r.date, new Map());
        grouped.get(r.date).set(r.medId, r.taken);
      }
      return grouped;
    } catch (err) {
      console.error(`[DB] getTakenForMonth(${year}, ${month}) failed:`, err);
      return new Map();
    }
  }

  /**
   * Deletes all taken records associated with a specific medication.
   * Uses Promise.all for parallel deletes — avoids slow sequential transactions
   * when a medication has a long history.
   * Called when a medication is deleted.
   * @param {number} medId
   * @returns {Promise<void>}
   */
  async function deleteTakenForMed(medId) {
    try {
      const all = await dbGetAll(STORE_TAKEN);
      const toDelete = all.filter(r => r.medId === medId);
      await Promise.all(toDelete.map(r => dbDelete(STORE_TAKEN, [r.date, r.medId])));
    } catch (err) {
      console.error(`[DB] deleteTakenForMed(${medId}) failed:`, err);
    }
  }

  // ════════════════════════════
  // 4. BUSINESS LOGIC
  // ════════════════════════════

  /**
   * Classifies a blood pressure reading.
   * @param {number} sys - systolic
   * @param {number} dia - diastolic
   * @returns {{ label: string, cls: string }}
   */
  function classify(sys, dia) {
    if (sys >= 180 || dia >= 110) return { label: 'Kriza',    cls: 'crisis' };
    if (sys >= 140 || dia >= 90)  return { label: 'Visok',    cls: 'high'   };
    return                               { label: 'Normalan', cls: 'normal'  };
  }

  /**
   * Returns today's date as "YYYY-MM-DD" in local time.
   * @returns {string}
   */
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  /**
   * Extracts local date string "YYYY-MM-DD" from an ISO timestamp.
   * @param {string} iso
   * @returns {string}
   */
  function localDateOf(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  /**
   * Escapes HTML special characters to prevent XSS.
   * @param {string} s
   * @returns {string}
   */
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  /**
   * Escapes double-quotes for CSV cell values.
   * @param {string} s
   * @returns {string}
   */
  function escCsv(s) { return String(s).replace(/"/g,'""'); }

  // ════════════════════════════
  // 5. UI RENDER FUNCTIONS
  // ════════════════════════════

  /** Sets the date and time inputs to the current local time. */
  function setDateTimeDefaults() {
    const now  = new Date();
    // Use local date parts — toISOString() returns UTC and can show the wrong day
    // for users in UTC+N timezones after midnight local time.
    const yyyy = now.getFullYear();
    const mo   = String(now.getMonth() + 1).padStart(2, '0');
    const dd   = String(now.getDate()).padStart(2, '0');
    const hh   = String(now.getHours()).padStart(2, '0');
    const mm   = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('entry-date').value = `${yyyy}-${mo}-${dd}`;
    document.getElementById('entry-time').value = `${hh}:${mm}`;
  }

  /**
   * Renders the "Lekovi danas" section with today's med checkboxes.
   * Reads medications and today's taken records from IndexedDB.
   */
  async function renderTodayMeds() {
    const el = document.getElementById('today-meds-list');
    try {
      const meds     = await dbGetAll(STORE_MEDICATIONS);
      const todayMap = await getTakenForDate(todayStr());

      if (!meds.length) {
        el.innerHTML = `<div class="today-empty"><p>Nema lekova.</p><button class="btn-add-med-empty" onclick="switchTab('lekovi')">+ Dodaj lek</button></div>`;
        return;
      }

      el.innerHTML = meds.map(m => {
        const isTaken  = !!todayMap.get(m.id);
        const lowStock = m.qty !== null && m.stock !== null && m.stock <= 5;
        const stockLine = m.stock !== null
          ? `<div class="${lowStock ? 'low-stock-warn' : 'med-check-sub'}">${lowStock ? '⚠ ' : ''}Ostalo: ${m.stock} kom</div>`
          : '';
        return `
          <div class="med-check-item ${isTaken ? 'taken' : ''}" onclick="toggleMed(${m.id})">
            <div class="med-checkbox">${isTaken ? '✓' : ''}</div>
            <div class="med-check-info">
              <div class="med-check-name">${escHtml(m.name)}</div>
              ${stockLine}
            </div>
          </div>`;
      }).join('');
    } catch (err) {
      console.error('[renderTodayMeds] Error:', err);
      el.innerHTML = '<div class="empty">Greška pri učitavanju lekova.</div>';
    }
  }

  /**
   * Renders the medications management tab.
   * Reads all medications from IndexedDB.
   */
  async function renderMeds() {
    const el = document.getElementById('med-list');
    try {
      const meds = await dbGetAll(STORE_MEDICATIONS);

      if (!meds.length) {
        el.innerHTML = '<div class="empty">Nema lekova.</div>';
        return;
      }

      el.innerHTML = meds.map(m => {
        // Stock bar — only if qty is defined
        let stockHtml = '';
        if (m.qty && m.stock !== null) {
          const pct = Math.min(100, Math.round((m.stock / m.qty) * 100));
          const low = m.stock <= 5;
          stockHtml = `
            <div class="stock-row">
              <div class="stock-bar-wrap">
                <div class="stock-bar-fill${low ? ' low' : ''}" style="width:${pct}%"></div>
              </div>
              <span class="stock-label ${low ? 'stock-warn' : ''}">${m.stock} / ${m.qty}</span>
            </div>`;
        }

        const meta = [
          m.qty   ? `${m.qty} kom/kutija` : null,
          m.price ? `${m.price} din`      : null,
        ].filter(Boolean).join(' · ');

        return `
          <div class="med-card">
            <div class="med-card-header">
              <div>
                <div class="med-card-name">${escHtml(m.name)}</div>
                ${meta ? `<div class="med-card-meta">${meta}</div>` : ''}
              </div>
              <div class="med-card-actions">
                <button class="btn-del-med" onclick="deleteMed(${m.id})">✕</button>
              </div>
            </div>
            ${stockHtml}
            ${(m.qty || m.stock !== null) ? `
            <div class="med-card-footer">
              ${m.qty ? `<button class="btn-refill" onclick="refillMed(${m.id})">+ Kutija</button>` : ''}
              ${m.stock !== null ? `
              <div class="med-stock-controls">
                <button class="btn-stock-adj" onclick="adjustStock(${m.id}, -1)">–1</button>
                <span class="stock-count-display">${m.stock !== null ? m.stock : '—'}</span>
                <button class="btn-stock-adj" onclick="adjustStock(${m.id}, +1)">+1</button>
              </div>` : ''}
            </div>` : ''}
          </div>`;
      }).join('');
    } catch (err) {
      console.error('[renderMeds] Error:', err);
      el.innerHTML = '<div class="empty">Greška pri učitavanju lekova.</div>';
    }
  }

  /**
   * Updates the month navigation label text (e.g. "Maj 2026").
   */
  function updateMonthNavLabel() {
    const label = document.getElementById('month-nav-label');
    if (label) {
      label.textContent = `${SR_MONTHS[histViewMonth.month]} ${histViewMonth.year}`;
    }
  }

  /**
   * Shifts the viewed month by delta (-1 = previous, +1 = next).
   * Clears the date filter and re-renders history.
   * @param {number} delta
   */
  function shiftMonth(delta) {
    let { year, month } = histViewMonth;
    month += delta;
    if (month < 0)  { month = 11; year -= 1; }
    if (month > 11) { month = 0;  year += 1; }
    histViewMonth = { year, month };
    // Clear date filter when navigating months — filter applies within current month only
    document.getElementById('filter-date').value = '';
    updateMonthNavLabel();
    renderHistory();
  }

  /**
   * Formats a "YYYY-MM-DD" string to a localized Serbian day header.
   * Uses noon (T12:00:00) to avoid DST edge cases where midnight can shift the date.
   * e.g. "2026-05-31" → "31. maj 2026, subota"
   * @param {string} dateStr - "YYYY-MM-DD"
   * @returns {string}
   */
  function formatDayHeader(dateStr) {
    const d    = new Date(dateStr + 'T12:00:00');
    const days = ['Nedelja','Ponedeljak','Utorak','Sreda','Četvrtak','Petak','Subota'];
    return `${d.getDate()}. ${SR_MONTHS[d.getMonth()].toLowerCase()} ${d.getFullYear()}, ${days[d.getDay()].toLowerCase()}`;
  }

  /**
   * Renders the history tab grouped by day for the currently viewed month.
   * If a date filter is active, shows only that day (filter must be within the viewed month).
   * Groups entries into day-block cards; entries within a day are separated by a border.
   */
  async function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = '<div class="db-loading">Učitavanje…</div>';

    updateMonthNavLabel();

    try {
      const filterDate = document.getElementById('filter-date').value;
      // Load all entries sorted newest-first via IDB ts-index cursor
      let entries = await getMeasurementsSortedDesc();

      // Filter to the currently viewed month
      entries = entries.filter(e => {
        const d = new Date(e.ts);
        return d.getFullYear() === histViewMonth.year && d.getMonth() === histViewMonth.month;
      });

      // If a specific date filter is active, narrow to that day only
      if (filterDate) {
        entries = entries.filter(e => localDateOf(e.ts) === filterDate);
      }

      document.getElementById('count-label').textContent = `${entries.length} unosa`;

      if (!entries.length) {
        list.innerHTML = '<div class="empty">Nema unosa.</div>';
        return;
      }

      const meds     = await dbGetAll(STORE_MEDICATIONS);
      // Load taken records only for the viewed month — avoids full table scan
      const allTaken = await getTakenForMonth(histViewMonth.year, histViewMonth.month);

      // Group entries by local date string "YYYY-MM-DD", preserving newest-first order
      const groups = new Map(); // Map<dateStr, entry[]>
      for (const e of entries) {
        const key = localDateOf(e.ts);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(e);
      }

      // Build HTML — one .day-group card per date
      list.innerHTML = [...groups.entries()].map(([dateKey, dayEntries]) => {
        const dayTaken = allTaken.get(dateKey) || new Map();

        const entriesHtml = dayEntries.map(e => {
          const cat      = classify(e.sys, e.dia);
          const sc       = `sys-${cat.cls}`;
          const medPills = meds.length
            ? meds.map(m => {
                const ok = !!dayTaken.get(m.id);
                return `<span class="med-pill ${ok ? 'ok' : 'nok'}">${ok ? '✓' : '✗'} ${escHtml(m.name)}</span>`;
              }).join('')
            : '';

          // Show only time (HH:MM) inside a day group — date is in the header
          const dt = new Date(e.ts);
          const hh = String(dt.getHours()).padStart(2, '0');
          const mi = String(dt.getMinutes()).padStart(2, '0');

          return `
            <div class="entry">
              <div>
                <div class="entry-values">
                  <span class="val-sys ${sc}">${e.sys}</span>
                  <span class="val-sep">/</span>
                  <span class="val-dia ${sc}">${e.dia}</span>
                  <span class="val-pulse">♥ ${e.pulse}</span>
                </div>
                <div class="entry-time">${hh}:${mi}</div>
                ${e.note ? `<div class="entry-note">${escHtml(e.note)}</div>` : ''}
                ${medPills ? `<div class="entry-meds">${medPills}</div>` : ''}
              </div>
              <div class="entry-right">
                <span class="badge badge-${cat.cls}">${cat.label}</span>
                <button class="btn-del-entry" onclick="deleteEntry(${e.id})">✕</button>
              </div>
            </div>`;
        }).join('');

        return `
          <div class="day-group">
            <div class="day-group-header">${formatDayHeader(dateKey)}</div>
            ${entriesHtml}
          </div>`;
      }).join('');

    } catch (err) {
      console.error('[renderHistory] Error:', err);
      document.getElementById('count-label').textContent = '';
      list.innerHTML = '<div class="empty">Greška pri učitavanju istorije.</div>';
    }
  }

  // ════════════════════════════
  // 6. EVENT LISTENERS / ACTIONS
  // ════════════════════════════

  // ── TAB SWITCHING ──

  /**
   * Switches the active tab and re-renders its content.
   * @param {string} name - "danas" | "lekovi" | "istorija"
   */
  function switchTab(name) {
    ['danas', 'lekovi', 'istorija'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
      document.getElementById(`tbtn-${t}`).classList.toggle('active', t === name);
    });
    if (name === 'danas')    renderTodayMeds();
    if (name === 'lekovi')   renderMeds();
    if (name === 'istorija') renderHistory();
  }

  // ── AUTO-ADVANCE BP INPUTS ──
  ['sys', 'dia', 'pulse'].forEach((id, idx, arr) => {
    document.getElementById(id).addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '').slice(0, 3);
      if (this.value.length === 3 && idx < arr.length - 1) {
        document.getElementById(arr[idx + 1]).focus();
      }
    });
  });

  // ── ENTER KEY ON PULSE — submits the BP form ──
  // On Android, the soft keyboard "Done"/"Go" button fires keydown Enter.
  // The note field is optional so pulse is the last required field.
  document.getElementById('pulse').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); saveEntry(); }
  });
  document.getElementById('note').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); saveEntry(); }
  });

  // ── BP SAVE ──

  /**
   * Validates and saves a new BP measurement to IndexedDB.
   * Clears the form and resets date/time on success.
   */
  async function saveEntry() {
    const sys   = parseInt(document.getElementById('sys').value,   10);
    const dia   = parseInt(document.getElementById('dia').value,   10);
    const pulse = parseInt(document.getElementById('pulse').value, 10);
    const note  = document.getElementById('note').value.trim();
    const dateV = document.getElementById('entry-date').value;
    const timeV = document.getElementById('entry-time').value;

    // Validate bounds (VALID constants — do not change)
    if (!sys || !dia || !pulse
      || sys   < VALID.sysMin   || sys   > VALID.sysMax
      || dia   < VALID.diaMin   || dia   > VALID.diaMax
      || pulse < VALID.pulseMin || pulse > VALID.pulseMax) {
      showToast('Unesite ispravne vrednosti!', true);
      return;
    }
    if (!dateV || !timeV) {
      showToast('Nedostaje datum ili vreme!', true);
      return;
    }

    try {
      const ts = new Date(`${dateV}T${timeV}:00`).toISOString();
      await dbPut(STORE_MEASUREMENTS, { id: Date.now(), ts, sys, dia, pulse, note });

      ['sys', 'dia', 'pulse', 'note'].forEach(id => {
        document.getElementById(id).value = '';
      });
      setDateTimeDefaults();
      showToast('Merenje sačuvano ✓');
    } catch (err) {
      console.error('[saveEntry] Error:', err);
      showToast('Greška pri čuvanju merenja!', true);
    }
  }

  /**
   * Deletes a single BP entry from IndexedDB by id.
   * @param {number} id
   */
  async function deleteEntry(id) {
    if (!confirm('Obrisati merenje?')) return;
    try {
      await dbDelete(STORE_MEASUREMENTS, id);
      renderHistory();
    } catch (err) {
      console.error('[deleteEntry] Error:', err);
      showToast('Greška pri brisanju merenja!', true);
    }
  }

  /**
   * Clears the active date filter and re-renders history for the full viewed month.
   */
  function clearHistFilter() {
    document.getElementById('filter-date').value = '';
    renderHistory();
  }

  // ── MED TOGGLE ──

  /** Per-medId busy set — prevents double-tap race on the same med without blocking other meds */
  const _toggleMedBusy = new Set();

  /**
   * Toggles the taken state of a medication for today.
   * Adjusts stock count if the medication tracks quantity.
   * Guarded per medId: double-tapping the same med is ignored,
   * but tapping a different med while one is in progress still works.
   * @param {number} medId
   */
  async function toggleMed(medId) {
    if (_toggleMedBusy.has(medId)) return; // ignore double-tap on this specific med
    _toggleMedBusy.add(medId);
    try {
      const today    = todayStr();
      const todayMap = await getTakenForDate(today);
      const wasTaken = !!todayMap.get(medId);

      // Write new taken state
      await dbPut(STORE_TAKEN, { date: today, medId, taken: !wasTaken });

      // Adjust stock if tracked
      const med = await dbGet(STORE_MEDICATIONS, medId);

      if (med && med.stock !== null) {
        if (!wasTaken) {
          // Marking as taken → subtract 1
          med.stock = Math.max(0, med.stock - 1);
          await dbPut(STORE_MEDICATIONS, med);
          if (med.stock <= 5) {
            showToast(`⚠ ${med.name} — ostalo ${med.stock} kom`, true);
          }
        } else {
          // Unmarking → add 1 back
          med.stock += 1;
          await dbPut(STORE_MEDICATIONS, med);
        }
      }

      renderTodayMeds();
    } catch (err) {
      console.error('[toggleMed] Error:', err);
      showToast('Greška pri ažuriranju leka!', true);
    } finally {
      _toggleMedBusy.delete(medId); // release lock for this specific med
    }
  }

  // ── MED CRUD ──

  /**
   * Validates and adds a new medication to IndexedDB.
   * Clears the add-med form fields on success.
   */
  async function addMed() {
    const name     = document.getElementById('med-name').value.trim();
    const qtyRaw   = document.getElementById('med-qty').value.trim();
    const priceRaw = document.getElementById('med-price').value.trim();

    if (!name) {
      showToast('Unesite naziv leka!', true);
      return;
    }

    const qty   = qtyRaw   ? parseInt(qtyRaw,   10) : null;
    const price = priceRaw ? parseInt(priceRaw, 10) : null;

    try {
      await dbPut(STORE_MEDICATIONS, { id: Date.now(), name, qty, price, stock: qty });
      ['med-name', 'med-qty', 'med-price'].forEach(id => {
        document.getElementById(id).value = '';
      });
      showToast(`${name} dodat ✓`);
      renderMeds();
      renderTodayMeds(); // keep today's med list in sync when a new med is added
    } catch (err) {
      console.error('[addMed] Error:', err);
      showToast('Greška pri dodavanju leka!', true);
    }
  }

  /**
   * Refills a medication's stock by adding one full box (qty).
   * @param {number} medId
   */
  async function refillMed(medId) {
    try {
      const med = await dbGet(STORE_MEDICATIONS, medId);
      if (!med) return;
      if (!med.qty) { showToast('Količina nije definisana', true); return; }

      med.stock = (med.stock || 0) + med.qty;
      await dbPut(STORE_MEDICATIONS, med);
      showToast(`+${med.qty} kom dodato ✓`);
      renderMeds();
      renderTodayMeds();
    } catch (err) {
      console.error('[refillMed] Error:', err);
      showToast('Greška pri refilu leka!', true);
    }
  }

  /**
   * Adjusts medication stock by a given delta (+1 or -1).
   * Clamps to 0 on the lower end; no upper bound enforced.
   * @param {number} medId
   * @param {number} delta - positive or negative integer
   */
  async function adjustStock(medId, delta) {
    try {
      const med = await dbGet(STORE_MEDICATIONS, medId);
      if (!med || med.stock === null) return;

      med.stock = Math.max(0, med.stock + delta);
      await dbPut(STORE_MEDICATIONS, med);

      // Warn on low stock after manual decrease
      if (delta < 0 && med.stock <= 5) {
        showToast(`⚠ ${med.name} — ostalo ${med.stock} kom`, true);
      }

      renderMeds();
      renderTodayMeds();
    } catch (err) {
      console.error('[adjustStock] Error:', err);
      showToast('Greška pri korekciji zaliha!', true);
    }
  }


  /**
   * Deletes a medication and all its associated taken records.
   * @param {number} medId
   */
  async function deleteMed(medId) {
    if (!confirm('Obrisati lek?')) return;
    try {
      await dbDelete(STORE_MEDICATIONS, medId);
      await deleteTakenForMed(medId);
      renderMeds();
      renderTodayMeds();
    } catch (err) {
      console.error('[deleteMed] Error:', err);
      showToast('Greška pri brisanju leka!', true);
    }
  }

  // ── CSV EXPORT ──

  /**
   * Exports all BP measurements (with per-day med status) as a UTF-8 CSV file.
   * Triggers a browser download.
   */
  async function exportCSV() {
    try {
      // Use IDB ts-index cursor — returns newest-first without JS sort
      const entries = await getMeasurementsSortedDesc();
      if (!entries.length) { showToast('Nema podataka za izvoz.', true); return; }

      const meds     = await dbGetAll(STORE_MEDICATIONS);
      const allTaken = await getAllTakenGrouped();

      const medHeaders = meds.map(m => escCsv(m.name)).join(',');
      const header = `Datum,Vreme,Gornji,Donji,Puls,Kategorija,Napomena${meds.length ? ',' + medHeaders : ''}`;

      const rows = entries.map(e => {
        const dt   = new Date(e.ts);
        const dd   = String(dt.getDate()).padStart(2,'0');
        const mm   = String(dt.getMonth()+1).padStart(2,'0');
        const hh   = String(dt.getHours()).padStart(2,'0');
        const mi   = String(dt.getMinutes()).padStart(2,'0');
        const cat  = classify(e.sys, e.dia);
        const dateKey  = localDateOf(e.ts);
        const dayTaken = allTaken.get(dateKey) || new Map();

        const medCols = meds.map(m => dayTaken.get(m.id) ? 'Da' : 'Ne').join(',');
        return `${dd}.${mm}.${dt.getFullYear()},${hh}:${mi},${e.sys},${e.dia},${e.pulse},${cat.label},"${(e.note||'').replace(/"/g,'""')}"${meds.length ? ',' + medCols : ''}`;
      });

      const csv  = [header, ...rows].join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });

      // navigator.share() is preferred on Android TWA — a.click() is unreliable in TWA context.
      // Falls back to anchor download for desktop browsers that don't support share API.
      const filename = `srce_pritisak_${todayStr()}.csv`;
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], filename, { type: 'text/csv' })] })) {
        try {
          await navigator.share({
            files: [new File([blob], filename, { type: 'text/csv' })],
            title: 'Srce & Pritisak — izvoz podataka',
          });
          return;
        } catch (shareErr) {
          // User cancelled share or share failed — fall through to anchor download
          if (shareErr.name === 'AbortError') return;
          console.warn('[exportCSV] navigator.share failed, falling back to anchor:', shareErr);
        }
      }

      // Fallback: anchor download (desktop / browsers without share API)
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (err) {
      console.error('[exportCSV] Error:', err);
      showToast('Greška pri izvozu!', true);
    }
  }

  // ── TOAST ──

  /**
   * Shows a brief notification toast at the bottom of the screen.
   * @param {string} msg    - message to display
   * @param {boolean} isErr - true = error style (orange), false = success (green)
   */
  function showToast(msg, isErr = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isErr ? 'var(--toast-err-bg)' : 'var(--toast-ok-bg)';
    t.style.color      = isErr ? 'var(--toast-err-fg)' : 'var(--toast-ok-fg)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  // ── VISIBILITY CHANGE — refresh when user returns to app ──

  /**
   * When the app returns to the foreground (e.g. user switches back from another app
   * or unlocks the phone), re-render the "Danas" tab so the date and med state are
   * always current. This handles the case where the app was left open overnight and
   * todayStr() would otherwise return yesterday's date until a full reload.
   */
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      // Always refresh date/time defaults regardless of active tab
      setDateTimeDefaults();
      // Only re-render today meds if "Danas" tab is active — avoids unnecessary DB reads
      const danasActive = document.getElementById('tab-danas').classList.contains('active');
      if (danasActive) renderTodayMeds();
    }
  });

  // ════════════════════════════
  // 7. APP INIT & SW REGISTRATION
  // ════════════════════════════

  /**
   * Registers the service worker for offline support.
   * Runs after the page loads to not block initial render.
   * Silent fail — SW is a progressive enhancement, app works without it.
   *
   * Auto-update flow:
   *   1. SW detects new index.html (hash changed) → installs new cache → activates.
   *   2. SW sends { type: 'SW_UPDATED' } to all open window clients.
   *   3. This listener receives the message and reloads the page.
   *   The reload is safe: IndexedDB data is never affected by a page reload.
   */
  function registerServiceWorker() {
    if (!('serviceWorker' in navigator)) return;
    // Register immediately — do NOT wrap in window.addEventListener('load', ...)
    // because appInit() is async and 'load' has already fired by the time we get here.
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => {
        console.log('[SW] Registered, scope:', reg.scope);
      })
      .catch(err => {
        console.warn('[SW] Registration failed:', err);
        // Non-fatal: app works without SW, just no offline support
      });

    // Listen for SW_UPDATED message — reload to apply the new cached version.
    // navigator.serviceWorker.controller is null on first install (no old SW),
    // so the reload only fires when an existing SW is replaced by a new one.
    navigator.serviceWorker.addEventListener('message', (event) => {
      if (event.data?.type === 'SW_UPDATED' && navigator.serviceWorker.controller) {
        console.log('[SW] New version active — reloading.');
        location.reload();
      }
    });
  }

  /**
   * Entry point: opens IndexedDB, runs migration if needed, then renders the UI.
   * Errors here are shown to the user and never result in a blank screen.
   */
  async function appInit() {
    try {
      db = await initDB();
      await migrateFromLocalStorage();
    } catch (err) {
      console.error('[appInit] IndexedDB init failed:', err);
      // Show error in all data areas — user must never see a blank/loading screen
      const errHtml = '<div class="empty">⚠ Baza podataka nije dostupna.<br>Pokušajte ponovo da otvorite aplikaciju.</div>';
      document.getElementById('today-meds-list').innerHTML = errHtml;
      document.getElementById('med-list').innerHTML        = errHtml;
      document.getElementById('history-list').innerHTML    = errHtml;
      return;
    }

    // Initialize history view to current month
    const now = new Date();
    histViewMonth = { year: now.getFullYear(), month: now.getMonth() };

    setDateTimeDefaults();
    await renderTodayMeds();
    registerServiceWorker();
  }

  appInit();
</script>
